<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Wardrobe</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f9f7f4;
      --surface: #ffffff;
      --surface2: #f2ede8;
      --border: #e5ddd5;
      --text: #1a1612;
      --text-muted: #7a6e65;
      --accent: #c4a882;
      --accent-dark: #9e7f5c;
      --accent-light: #f0e6d8;
      --danger: #d95f5f;
      --success: #5fa87a;
      --radius: 14px;
      --radius-sm: 8px;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
    }
    html { font-size: 16px; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; }
    button { font-family: inherit; cursor: pointer; border: none; outline: none; }
    input, textarea, select { font-family: inherit; outline: none; }
    img { display: block; max-width: 100%; }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 34px; height: 34px; background: var(--accent); border-radius: 10px; display: grid; place-items: center; font-size: 1.1rem; }
    .logo-text { font-weight: 700; font-size: 1.1rem; }
    .header-actions { display: flex; align-items: center; gap: 10px; }
    .header-status { font-size: 0.75rem; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; }
    .status-dot.online { background: var(--success); }
    .status-dot.error { background: var(--danger); }

    /* ── Buttons ── */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: var(--radius-sm); font-size: 0.875rem; font-weight: 600; transition: all 0.15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-ghost { background: transparent; color: var(--text-muted); }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }
    .btn-icon { width: 38px; height: 38px; padding: 0; border-radius: var(--radius-sm); display: grid; place-items: center; font-size: 1.1rem; }
    .btn-danger { background: #fff0f0; color: var(--danger); }
    .btn-danger:hover { background: #ffd6d6; }
    .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Filter Bar ── */
    .filter-bar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 24px; display: flex; align-items: center; gap: 8px;
      height: 52px; overflow-x: auto; scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-label { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; margin-right: 4px; }
    .filter-chip { padding: 5px 14px; border-radius: 100px; border: 1.5px solid var(--border); background: transparent; font-size: 0.8rem; font-weight: 500; color: var(--text-muted); white-space: nowrap; transition: all 0.15s; }
    .filter-chip:hover { border-color: var(--accent); color: var(--accent-dark); }
    .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .filter-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; margin: 0 4px; }

    /* ── Main ── */
    main { flex: 1; padding: 28px 24px; max-width: 1400px; margin: 0 auto; width: 100%; }
    .stats { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; }
    .stat-item { font-size: 0.85rem; color: var(--text-muted); }
    .stat-item strong { color: var(--text); font-weight: 600; }

    /* ── Loading skeleton ── */
    .skeleton { background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius); }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skeleton-card { height: 300px; }

    /* ── Empty State ── */
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; text-align: center; gap: 16px; }
    .empty-icon { width: 80px; height: 80px; background: var(--accent-light); border-radius: 50%; display: grid; place-items: center; font-size: 2.2rem; }

    /* ── Grid ── */
    .clothing-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }

    /* ── Card ── */
    .clothing-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: all 0.2s; box-shadow: var(--shadow); }
    .clothing-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: var(--accent); }
    .card-image { width: 100%; aspect-ratio: 3/4; object-fit: cover; background: var(--surface2); }
    .card-image-placeholder { width: 100%; aspect-ratio: 3/4; background: var(--surface2); display: grid; place-items: center; font-size: 2.5rem; color: var(--border); }
    .card-body { padding: 12px 14px 14px; }
    .card-name { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag { display: inline-flex; align-items: center; gap: 3px; padding: 3px 8px; border-radius: 100px; font-size: 0.7rem; font-weight: 500; background: var(--accent-light); color: var(--accent-dark); }
    .tag.season { background: #e8f4e8; color: #3d7a4d; }
    .tag.mood { background: #e8e8f4; color: #4d4d7a; }
    .tag.color { background: var(--surface2); color: var(--text-muted); }
    .card-analyzing { display: flex; align-items: center; gap: 8px; padding: 8px 14px; font-size: 0.75rem; color: var(--text-muted); background: var(--accent-light); }
    .spinner { width: 14px; height: 14px; border: 2px solid var(--accent-light); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Upload Zone ── */
    .upload-zone { border: 2px dashed var(--border); border-radius: var(--radius); aspect-ratio: 3/4; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; background: var(--surface); gap: 8px; }
    .upload-zone:hover, .upload-zone.dragover { border-color: var(--accent); background: var(--accent-light); }
    .upload-zone-icon { font-size: 1.8rem; }
    .upload-zone p { color: var(--text-muted); font-size: 0.78rem; text-align: center; padding: 0 10px; }
    .upload-zone strong { color: var(--accent-dark); }

    /* ── Progress bar for upload ── */
    .upload-progress { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 4px; }
    .upload-progress-bar { height: 100%; background: var(--accent); transition: width 0.3s; }

    /* ── Modal ── */
    .modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.45); backdrop-filter: blur(4px); display: grid; place-items: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-lg); width: 100%; max-width: 760px; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; transform: translateY(12px); transition: transform 0.2s; }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .modal-body { flex: 1; overflow-y: auto; padding: 24px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }

    /* ── Detail Layout ── */
    .detail-layout { display: grid; grid-template-columns: 240px 1fr; gap: 28px; }
    @media (max-width: 600px) { .detail-layout { grid-template-columns: 1fr; } }
    .detail-image-wrap { border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); aspect-ratio: 3/4; background: var(--surface2); position: relative; }
    .detail-image-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .detail-image-loading { position: absolute; inset: 0; display: grid; place-items: center; background: var(--surface2); }
    .detail-fields { display: flex; flex-direction: column; gap: 16px; }
    .field-group { display: flex; flex-direction: column; gap: 6px; }
    .field-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); }

    /* ── Inputs ── */
    .input { width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 0.9rem; color: var(--text); background: var(--surface); transition: border-color 0.15s; }
    .input:focus { border-color: var(--accent); }
    .input-name { font-size: 1.05rem; font-weight: 600; padding: 8px 0; border: none; border-bottom: 2px solid var(--border); border-radius: 0; background: transparent; }
    .input-name:focus { border-color: var(--accent); }

    /* ── Tag Editor ── */
    .tag-editor { display: flex; flex-wrap: wrap; gap: 5px; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); min-height: 42px; cursor: text; }
    .tag-editor:focus-within { border-color: var(--accent); }
    .tag-editable { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 100px; font-size: 0.78rem; font-weight: 500; background: var(--accent-light); color: var(--accent-dark); }
    .tag-editable .remove { cursor: pointer; opacity: 0.6; font-size: 0.9rem; }
    .tag-editable .remove:hover { opacity: 1; }
    .tag-input { border: none; background: transparent; font-size: 0.78rem; min-width: 80px; flex: 1; color: var(--text); }
    .tag-input::placeholder { color: var(--text-muted); }

    /* ── Settings ── */
    .settings-form { display: flex; flex-direction: column; gap: 20px; }
    .setting-item { display: flex; flex-direction: column; gap: 8px; }
    .setting-label { font-weight: 600; font-size: 0.875rem; }
    .setting-desc { font-size: 0.8rem; color: var(--text-muted); }
    .api-key-wrap { position: relative; }
    .api-key-wrap .input { padding-right: 40px; font-family: monospace; font-size: 0.82rem; }
    .api-key-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 1rem; padding: 4px; }

    /* ── Analyzing Banner ── */
    .analyzing-banner { background: var(--accent-light); border: 1px solid var(--accent); border-radius: var(--radius-sm); padding: 14px 18px; display: flex; align-items: center; gap: 12px; font-size: 0.875rem; color: var(--accent-dark); margin-bottom: 20px; }
    .analyzing-banner .spinner { width: 18px; height: 18px; border-color: var(--accent-light); border-top-color: var(--accent-dark); }

    /* ── Toast ── */
    .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 12px 18px; border-radius: var(--radius-sm); font-size: 0.875rem; font-weight: 500; box-shadow: var(--shadow-lg); animation: slideIn 0.2s ease; max-width: 320px; }
    .toast.success { background: var(--success); color: #fff; }
    .toast.error { background: var(--danger); color: #fff; }
    .toast.info { background: var(--accent); color: #fff; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .no-results { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    @media (max-width: 500px) {
      header, main, .filter-bar { padding-left: 16px; padding-right: 16px; }
      .clothing-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    }
  </style>
</head>
<body>

<div id="app" style="display:flex;flex-direction:column;min-height:100vh">

  <header>
    <div class="logo">
      <div class="logo-icon">👗</div>
      <span class="logo-text">My Wardrobe</span>
    </div>
    <div class="header-actions">
      <div class="header-status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Verbinde…</span>
      </div>
      <button class="btn btn-ghost btn-icon" id="settingsBtn" title="Einstellungen">⚙️</button>
      <button class="btn btn-primary" id="addBtn">+ Hinzufügen</button>
    </div>
  </header>

  <div class="filter-bar" id="filterBar">
    <span class="filter-label">Filter</span>
    <button class="filter-chip active" data-filter="all">Alle</button>
    <div class="filter-sep"></div>
    <span class="filter-label">Kategorie</span>
    <button class="filter-chip" data-filter="cat:Oberteil">Oberteil</button>
    <button class="filter-chip" data-filter="cat:Hose">Hose</button>
    <button class="filter-chip" data-filter="cat:Kleid">Kleid</button>
    <button class="filter-chip" data-filter="cat:Jacke">Jacke</button>
    <button class="filter-chip" data-filter="cat:Schuhe">Schuhe</button>
    <button class="filter-chip" data-filter="cat:Accessoire">Accessoire</button>
    <div class="filter-sep"></div>
    <span class="filter-label">Jahreszeit</span>
    <button class="filter-chip" data-filter="season:Frühling">🌸 Frühling</button>
    <button class="filter-chip" data-filter="season:Sommer">☀️ Sommer</button>
    <button class="filter-chip" data-filter="season:Herbst">🍂 Herbst</button>
    <button class="filter-chip" data-filter="season:Winter">❄️ Winter</button>
    <div class="filter-sep"></div>
    <span class="filter-label">Style</span>
    <button class="filter-chip" data-filter="mood:Casual">Casual</button>
    <button class="filter-chip" data-filter="mood:Elegant">Elegant</button>
    <button class="filter-chip" data-filter="mood:Sportlich">Sportlich</button>
    <button class="filter-chip" data-filter="mood:Minimal">Minimal</button>
    <button class="filter-chip" data-filter="mood:Boho">Boho</button>
    <button class="filter-chip" data-filter="mood:Business">Business</button>
  </div>

  <main>
    <div class="stats" id="stats"></div>
    <div id="wardrobeGrid"></div>
  </main>

  <div class="toast-container" id="toastContainer"></div>
  <input type="file" id="fileInput" accept="image/*" multiple style="display:none" />
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
  <div class="modal" style="max-width:820px">
    <div class="modal-header">
      <h2 id="detailModalTitle">Kleidungsstück</h2>
      <button class="btn btn-ghost btn-icon" id="detailModalClose">✕</button>
    </div>
    <div class="modal-body" id="detailModalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="deleteBtn">🗑 Löschen</button>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost" id="detailCancelBtn">Abbrechen</button>
        <button class="btn btn-primary" id="saveBtn">Speichern</button>
      </div>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <h2>⚙️ Einstellungen</h2>
      <button class="btn btn-ghost btn-icon" id="settingsModalClose">✕</button>
    </div>
    <div class="modal-body">
      <div class="settings-form">
        <div class="setting-item">
          <label class="setting-label" for="apiKeyInput">Anthropic API-Key</label>
          <p class="setting-desc">Für die automatische KI-Bildanalyse. Key erhältst du unter <a href="https://console.anthropic.com" target="_blank" style="color:var(--accent-dark)">console.anthropic.com</a>.</p>
          <div class="api-key-wrap">
            <input class="input" type="password" id="apiKeyInput" placeholder="sk-ant-..." />
            <button class="api-key-toggle" id="apiKeyToggle">👁</button>
          </div>
          <p class="setting-desc" style="margin-top:4px">Der Key wird nur in deinem Browser gespeichert und nie an unsere Server gesendet.</p>
        </div>
      </div>
    </div>
    <div class="modal-footer" style="justify-content:flex-end">
      <button class="btn btn-primary" id="saveSettingsBtn">Speichern</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  CONFIG & STATE
// ═══════════════════════════════════════════════════════════
const SETTINGS_KEY = 'wardrobe_settings_v2';

const state = {
  items: [],           // Listenansicht (ohne imageData)
  imageCache: {},      // id → imageData (lazy geladen)
  settings: loadSettings(),
  activeFilter: 'all',
  editingItem: null,
  loading: true,
};

function loadSettings() {
  try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {}; }
  catch { return {}; }
}
function saveSettings() {
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(state.settings));
}

// ═══════════════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════════════
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function showToast(msg, type = 'info', duration = 3500) {
  const c = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), duration);
}

function openModal(id) {
  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setStatus(state) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  if (state === 'online')  { dot.className = 'status-dot online'; txt.textContent = 'Verbunden'; }
  if (state === 'error')   { dot.className = 'status-dot error';  txt.textContent = 'Verbindungsfehler'; }
  if (state === 'loading') { dot.className = 'status-dot';         txt.textContent = 'Verbinde…'; }
}

// ═══════════════════════════════════════════════════════════
//  IMAGE COMPRESSION
// ═══════════════════════════════════════════════════════════
function compressImage(file, maxWidthHeight = 1200, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let { width, height } = img;
      if (width > maxWidthHeight || height > maxWidthHeight) {
        const ratio = Math.min(maxWidthHeight / width, maxWidthHeight / height);
        width = Math.round(width * ratio);
        height = Math.round(height * ratio);
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      const dataUrl = canvas.toDataURL('image/jpeg', quality);
      const base64 = dataUrl.split(',')[1];
      resolve({ base64, dataUrl, mimeType: 'image/jpeg' });
    };
    img.onerror = reject;
    img.src = url;
  });
}

// ═══════════════════════════════════════════════════════════
//  API CALLS
// ═══════════════════════════════════════════════════════════
async function apiFetch(path, options = {}) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json', ...options.headers },
    ...options,
    body: options.body ? JSON.stringify(options.body) : undefined,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  return res.json();
}

async function loadAllItems() {
  setStatus('loading');
  try {
    state.items = await apiFetch('/api/items');
    setStatus('online');
  } catch (err) {
    setStatus('error');
    showToast(`Fehler beim Laden: ${err.message}`, 'error', 6000);
    state.items = [];
  }
  state.loading = false;
  renderGrid();
}

async function loadItemImage(id) {
  if (state.imageCache[id]) return state.imageCache[id];
  try {
    const item = await apiFetch(`/api/items/${id}`);
    if (item.imageData) {
      state.imageCache[id] = item.imageData;
      return item.imageData;
    }
  } catch {}
  return null;
}

async function createItem(doc) {
  return apiFetch('/api/items', { method: 'POST', body: doc });
}

async function updateItem(id, updates) {
  return apiFetch(`/api/items/${id}`, { method: 'PUT', body: updates });
}

async function deleteItem(id) {
  return apiFetch(`/api/items/${id}`, { method: 'DELETE' });
}

// ═══════════════════════════════════════════════════════════
//  CLAUDE API – KI-ANALYSE
// ═══════════════════════════════════════════════════════════
async function analyzeClothing(base64Image, mimeType) {
  const apiKey = state.settings.apiKey;
  if (!apiKey) {
    showToast('Bitte zuerst den API-Key in ⚙️ Einstellungen eintragen.', 'error', 5000);
    return null;
  }

  const prompt = `Du bist ein Modeexperte. Analysiere dieses Kleidungsstück-Bild und antworte NUR mit einem validen JSON-Objekt (kein Markdown, keine Erklärungen):

{
  "name": "Kurzer beschreibender Name (z.B. 'Weißes Leinenhemd')",
  "kategorie": "Eines von: Oberteil, Hose, Kleid, Rock, Jacke, Mantel, Pullover, Schuhe, Accessoire, Sonstiges",
  "farben": ["Hauptfarbe", "optionale Akzentfarbe"],
  "sitz": "Eines von: Slim/Eng, Regular/Normal, Oversized/Weit",
  "laenge": "Eines von: Kurz, Normal, Lang",
  "material": "Erkanntes Material (z.B. Baumwolle, Leder, Leinen, Wolle, Synthetik)",
  "textur": "Kurzbeschreibung (z.B. Glatt, Gestrickt, Denim, Strukturiert, Seidig)",
  "waerme": "Eines von: Sehr leicht (25°C+), Leicht (20-25°C), Mittel (10-20°C), Warm (0-10°C), Sehr warm (-10-0°C)",
  "jahreszeiten": ["aus: Frühling, Sommer, Herbst, Winter"],
  "styleMood": ["2-3 aus: Casual, Elegant, Sportlich, Minimal, Boho, Business, Streetwear, Romantic, Rock, Vintage, Preppy, Festlich"],
  "notizen": "1-2 Sätze Kombinationstipps"
}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-calls': 'true',
      },
      body: JSON.stringify({
        model: 'claude-opus-4-6',
        max_tokens: 1024,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: mimeType, data: base64Image } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      showToast(`KI-Fehler: ${err?.error?.message || res.status}`, 'error', 5000);
      return null;
    }

    const data = await res.json();
    const text = data.content[0].text.trim().replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/\s*```$/,'');
    return JSON.parse(text);
  } catch (err) {
    showToast(`Analyse fehlgeschlagen: ${err.message}`, 'error', 5000);
    return null;
  }
}

// ═══════════════════════════════════════════════════════════
//  UPLOAD & ANALYSE
// ═══════════════════════════════════════════════════════════
async function handleFiles(files) {
  if (!state.settings.apiKey) {
    openModal('settingsModal');
    showToast('Bitte zuerst den API-Key hinterlegen.', 'info');
    return;
  }

  for (const file of Array.from(files)) {
    if (!file.type.startsWith('image/')) continue;

    showToast(`📷 Komprimiere ${file.name}…`, 'info', 2000);
    let compressed;
    try {
      compressed = await compressImage(file);
    } catch {
      showToast(`Konnte ${file.name} nicht lesen.`, 'error');
      continue;
    }

    // Placeholder anlegen
    const placeholder = {
      id: `tmp_${uid()}`,
      name: file.name.replace(/\.[^.]+$/,'') || 'Neues Kleidungsstück',
      analyzing: true,
      farben: [], jahreszeiten: [], styleMood: [],
      kategorie: '', sitz: '', laenge: '', material: '', textur: '', waerme: '', notizen: '',
      _imageData: compressed.dataUrl, // lokaler Cache
    };
    state.items.unshift(placeholder);
    renderGrid();

    // Gleichzeitig: DB-Eintrag + KI-Analyse
    const [created, analysis] = await Promise.all([
      createItem({
        name: placeholder.name,
        imageData: compressed.dataUrl,
        analyzing: true,
        farben: [], jahreszeiten: [], styleMood: [],
        kategorie: '', sitz: '', laenge: '', material: '', textur: '', waerme: '', notizen: '',
        addedAt: new Date().toISOString(),
      }),
      analyzeClothing(compressed.base64, compressed.mimeType),
    ]);

    if (!created) {
      state.items = state.items.filter(i => i.id !== placeholder.id);
      renderGrid();
      continue;
    }

    // Analyse-Ergebnis in DB speichern
    const finalData = analysis
      ? { ...analysis, analyzing: false }
      : { analyzing: false };

    await updateItem(created.id, finalData).catch(() => {});

    // Bild im Cache
    state.imageCache[created.id] = compressed.dataUrl;

    // Placeholder durch echtes Item ersetzen
    const finalItem = { ...created, ...finalData, id: created.id, _imageData: compressed.dataUrl };
    state.items = state.items.map(i => i.id === placeholder.id ? finalItem : i);

    if (analysis) showToast(`✓ ${analysis.name || finalItem.name} gespeichert!`, 'success');
    else showToast(`${finalItem.name} gespeichert (ohne Analyse).`, 'info');

    renderGrid();
  }
}

// ═══════════════════════════════════════════════════════════
//  FILTER
// ═══════════════════════════════════════════════════════════
function getFilteredItems() {
  const f = state.activeFilter;
  if (f === 'all') return state.items;
  if (f.startsWith('cat:'))    return state.items.filter(i => i.kategorie === f.slice(4));
  if (f.startsWith('season:')) return state.items.filter(i => (i.jahreszeiten||[]).includes(f.slice(7)));
  if (f.startsWith('mood:'))   return state.items.filter(i => (i.styleMood||[]).includes(f.slice(5)));
  return state.items;
}

// ═══════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════
function renderGrid() {
  const grid = document.getElementById('wardrobeGrid');
  const stats = document.getElementById('stats');
  const filtered = getFilteredItems();

  stats.innerHTML = `
    <span class="stat-item"><strong>${state.items.filter(i=>!i.analyzing).length}</strong> Teile</span>
    ${state.activeFilter !== 'all' ? `<span class="stat-item"><strong>${filtered.length}</strong> angezeigt</span>` : ''}
  `;

  if (state.loading) {
    grid.innerHTML = `<div class="clothing-grid">${Array(6).fill('<div class="skeleton skeleton-card"></div>').join('')}</div>`;
    return;
  }

  if (state.items.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">👗</div>
        <h2 style="font-size:1.15rem">Dein Kleiderschrank ist leer</h2>
        <p style="color:var(--text-muted);font-size:0.9rem;max-width:280px">Füge dein erstes Kleidungsstück hinzu – lade ein Foto hoch und die KI analysiert es automatisch.</p>
        <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">Erstes Foto hochladen</button>
      </div>`;
    return;
  }

  if (filtered.length === 0 && state.activeFilter !== 'all') {
    grid.innerHTML = `<div class="no-results"><p>Keine Kleidungsstücke für diesen Filter.</p></div>`;
    return;
  }

  const frag = document.createDocumentFragment();
  const wrapper = document.createElement('div');
  wrapper.className = 'clothing-grid';

  // Upload-Karte
  const uploadEl = document.createElement('div');
  uploadEl.innerHTML = `
    <div class="upload-zone" id="uploadZoneGrid">
      <div class="upload-zone-icon">📷</div>
      <p><strong>Klick</strong> oder ziehen</p>
    </div>`;
  wrapper.appendChild(uploadEl);

  for (const item of filtered) {
    const card = document.createElement('div');
    card.className = 'clothing-card';
    card.dataset.id = item.id;

    const imgSrc = item._imageData || state.imageCache[item.id];
    const imgHtml = imgSrc
      ? `<img class="card-image" src="${imgSrc}" alt="${esc(item.name)}" loading="lazy" />`
      : `<div class="card-image-placeholder" data-load-id="${item.id}">⌛</div>`;

    const tags = [
      ...(item.farben?.length    ? [`<span class="tag color">${esc(item.farben[0])}</span>`] : []),
      ...(item.jahreszeiten?.length ? [`<span class="tag season">${esc(item.jahreszeiten[0])}</span>`] : []),
      ...(item.styleMood?.length  ? [`<span class="tag mood">${esc(item.styleMood[0])}</span>`] : []),
    ];

    card.innerHTML = `
      ${imgHtml}
      ${item.analyzing ? `<div class="card-analyzing"><div class="spinner"></div> KI analysiert…</div>` : ''}
      <div class="card-body">
        <div class="card-name">${esc(item.name || 'Kein Name')}</div>
        <div class="card-tags">${tags.slice(0,3).join('')}</div>
      </div>`;

    card.addEventListener('click', () => { if (!item.analyzing) openDetailModal(item.id); });
    wrapper.appendChild(card);
  }

  frag.appendChild(wrapper);
  grid.innerHTML = '';
  grid.appendChild(frag);

  // Lazy-load Bilder für Karten ohne gecachtes Bild
  grid.querySelectorAll('[data-load-id]').forEach(async el => {
    const id = el.dataset.loadId;
    const img = await loadItemImage(id);
    if (img) {
      const card = grid.querySelector(`[data-id="${id}"] .card-image-placeholder`);
      if (card) card.outerHTML = `<img class="card-image" src="${img}" alt="" loading="lazy" />`;
    }
  });

  // Upload-Zone Events
  const uz = document.getElementById('uploadZoneGrid');
  if (uz) {
    uz.addEventListener('click', () => document.getElementById('fileInput').click());
    uz.addEventListener('dragover', e => { e.preventDefault(); uz.classList.add('dragover'); });
    uz.addEventListener('dragleave', () => uz.classList.remove('dragover'));
    uz.addEventListener('drop', e => { e.preventDefault(); uz.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
  }
}

// ═══════════════════════════════════════════════════════════
//  DETAIL MODAL
// ═══════════════════════════════════════════════════════════
async function openDetailModal(id) {
  const item = state.items.find(i => i.id === id);
  if (!item) return;
  state.editingItem = { ...item };

  document.getElementById('detailModalTitle').textContent = item.name || 'Kleidungsstück';
  renderDetailModal(item, null);
  openModal('detailModal');

  // Bild laden falls noch nicht gecacht
  const imgSrc = item._imageData || state.imageCache[id] || await loadItemImage(id);
  if (imgSrc) renderDetailModal(item, imgSrc);
}

          <label class="field-label">Kategorie</label>

          </select>
        </div>
        <div class="field-group">
          <label class="field-label">Farben</label>
          ${buildTagEditor('f_farben', item.farben||[], 'Farbe + Enter')}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="field-group">
            <label class="field-label">Sitz</label>
            <select class="input" id="f_sitz">
              <option value="">–</option>
              ${sitze.map(s=>`<option value="${s}" ${item.sitz===s?'selected':''}>${s}</option>`).join('')}
            </select>
          </div>
          <div class="field-group">
            <label class="field-label">Länge</label>
            <select class="input" id="f_laenge">
              <option value="">–</option>
              ${['Kurz','Normal','Lang'].map(l=>`<option value="${l}" ${item.laenge===l?'selected':''}>${l}</option>`).join('')}
            </select>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="field-group">
            <label class="field-label">Material</label>
            <input class="input" id="f_material" value="${esc(item.material||'')}" placeholder="z.B. Baumwolle" />
          </div>

            <label class="field-label">Textur</label>

          </div>
        </div>
        <div class="field-group">
          <label class="field-label">Wärme</label>
          <select class="input" id="f_waerme">
            <option value="">– wählen –</option>
            ${waerme.map(w=>`<option value="${w}" ${item.waerme===w?'selected':''}>${w}</option>`).join('')}
          </select>
        </div>
        <div class="field-group">
          <label class="field-label">Jahreszeiten</label>
          <div style="display:flex;gap:8px;flex-wrap:wrap">

          </div>

            ${moods.map(m=>`<label style="display:flex;align-items:center;gap:4px;cursor:pointer;font-size:0.85rem"><input type="checkbox" data-group="styleMood" value="${m}" ${(item.styleMood||[]).includes(m)?'checked':''} style="accent-color:var(--accent)" />${m}</label>`).join('')}
          </div>

// ── Tag Editor ──
function buildTagEditor(id, values, placeholder) {
  const tags = values.map(v=>`<span class="tag-editable">${esc(v)}<span class="remove">×</span></span>`).join('');
  return `<div class="tag-editor" id="${id}">${tags}<input class="tag-input" placeholder="${placeholder}" /></div>`;
}
function initTagEditor(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const input = el.querySelector('.tag-input');
  el.addEventListener('click', e => {
    if (e.target.classList.contains('remove')) e.target.closest('.tag-editable').remove();
    else input.focus();
  });
  input.addEventListener('keydown', e => {
    if ((e.key==='Enter'||e.key===',') && input.value.trim()) {
      e.preventDefault();
      const span = document.createElement('span');
      span.className = 'tag-editable';
      span.innerHTML = `${esc(input.value.trim())}<span class="remove">×</span>`;
      el.insertBefore(span, input);
      input.value = '';
    }
    if (e.key==='Backspace' && !input.value) {
      const tags = el.querySelectorAll('.tag-editable');
      if (tags.length) tags[tags.length-1].remove();
    }
  });
}
function getTagEditorValues(id) {
  return Array.from(document.querySelectorAll(`#${id} .tag-editable`)).map(t=>t.textContent.replace('×','').trim()).filter(Boolean);
}
function getCheckboxValues(group) {
  return Array.from(document.querySelectorAll(`[data-group="${group}"]:checked`)).map(c=>c.value);
}
function collectForm() {
  return {
    name:         document.getElementById('f_name')?.value.trim()||'',
    kategorie:    document.getElementById('f_kat')?.value||'',
    farben:       getTagEditorValues('f_farben'),
    sitz:         document.getElementById('f_sitz')?.value||'',
    laenge:       document.getElementById('f_laenge')?.value||'',
    material:     document.getElementById('f_material')?.value.trim()||'',
    textur:       document.getElementById('f_textur')?.value.trim()||'',
    waerme:       document.getElementById('f_waerme')?.value||'',
    jahreszeiten: getCheckboxValues('jahreszeiten'),
    styleMood:    getCheckboxValues('styleMood'),
    notizen:      document.getElementById('f_notizen')?.value.trim()||'',
  };
}

// ═══════════════════════════════════════════════════════════
//  EVENT LISTENERS
// ═══════════════════════════════════════════════════════════
document.getElementById('addBtn').addEventListener('click', () => document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', e => { handleFiles(e.target.files); e.target.value=''; });

// Drag & drop auf gesamte Seite
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => { e.preventDefault(); if(e.dataTransfer.files.length) handleFiles(e.dataTransfer.files); });

// Filter
document.getElementById('filterBar').addEventListener('click', e => {
  const chip = e.target.closest('.filter-chip');
  if (!chip) return;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  chip.classList.add('active');
  state.activeFilter = chip.dataset.filter;
  renderGrid();
});

// Detail Modal
document.getElementById('detailModalClose').addEventListener('click', () => closeModal('detailModal'));
document.getElementById('detailCancelBtn').addEventListener('click', () => closeModal('detailModal'));

document.getElementById('saveBtn').addEventListener('click', async () => {
  if (!state.editingItem) return;
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Speichern…';
  try {
    const values = collectForm();
    await updateItem(state.editingItem.id, values);
    // Lokalen State updaten
    state.items = state.items.map(i => i.id === state.editingItem.id ? {...i, ...values} : i);
    saveItems_noop();
    renderGrid();
    showToast('Gespeichert ✓', 'success');
    closeModal('detailModal');
  } catch(err) {
    showToast(`Fehler: ${err.message}`, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Speichern';
  }
});

document.getElementById('deleteBtn').addEventListener('click', async () => {
  if (!state.editingItem) return;
  if (!confirm(`"${state.editingItem.name}" wirklich löschen?`)) return;
  try {
    await deleteItem(state.editingItem.id);
    delete state.imageCache[state.editingItem.id];
    state.items = state.items.filter(i => i.id !== state.editingItem.id);
    renderGrid();
    showToast('Gelöscht.', 'info');
    closeModal('detailModal');
  } catch(err) {
    showToast(`Fehler: ${err.message}`, 'error');
  }
});

// Settings
document.getElementById('settingsBtn').addEventListener('click', () => {
  document.getElementById('apiKeyInput').value = state.settings.apiKey || '';
  openModal('settingsModal');
});
document.getElementById('settingsModalClose').addEventListener('click', () => closeModal('settingsModal'));
document.getElementById('saveSettingsBtn').addEventListener('click', () => {
  state.settings.apiKey = document.getElementById('apiKeyInput').value.trim();
  saveSettings();
  showToast('Einstellungen gespeichert!', 'success');
  closeModal('settingsModal');
});
document.getElementById('apiKeyToggle').addEventListener('click', () => {
  const inp = document.getElementById('apiKeyInput');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  document.getElementById('apiKeyToggle').textContent = inp.type === 'password' ? '👁' : '🙈';
});

// Overlay-Klick schließt Modal
document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', e => { if(e.target===o) closeModal(o.id); }));
document.addEventListener('keydown', e => { if(e.key==='Escape') document.querySelectorAll('.modal-overlay.open').forEach(m=>closeModal(m.id)); });

function saveItems_noop() {} // Items werden in DB gespeichert, kein localStorage nötig

// ═══════════════════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════════════════
loadAllItems();
</script>
