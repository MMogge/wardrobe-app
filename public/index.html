<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MY WARDROBE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #faf9f7;
      --surface: #ffffff;
      --surface2: #f5f3f0;
      --border: #e8e4df;
      --border-light: #f0ece8;
      --text: #1a1a1a;
      --text-muted: #8a8279;
      --text-light: #b5ada5;
      --accent: #c8a96e;
      --accent-dark: #a68b4b;
      --accent-light: #f7f0e3;
      --noir: #1a1a1a;
      --cream: #fdfcfa;
      --danger: #c25050;
      --success: #5a9e6f;
      --radius: 2px;
      --radius-sm: 2px;
      --shadow: 0 1px 3px rgba(0,0,0,0.04);
      --shadow-lg: 0 20px 60px rgba(0,0,0,0.08);
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    html { font-size: 16px; }
    body { font-family: var(--font-sans); background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; -webkit-font-smoothing: antialiased; }
    button { font-family: inherit; cursor: pointer; border: none; outline: none; }
    input, textarea, select { font-family: inherit; outline: none; }
    img { display: block; max-width: 100%; }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border-light);
      padding: 0 48px; height: 72px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 0; }
    .logo-text {
      font-family: var(--font-serif);
      font-weight: 300;
      font-size: 1.6rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--noir);
    }
    .header-actions { display: flex; align-items: center; gap: 16px; }
    .header-status { font-size: 0.7rem; color: var(--text-light); display: flex; align-items: center; gap: 6px; letter-spacing: 0.04em; text-transform: uppercase; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); }
    .status-dot.online { background: var(--success); }
    .status-dot.error { background: var(--danger); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 24px;
      border-radius: var(--radius);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: all var(--transition);
    }
    .btn-primary { background: var(--noir); color: #fff; }
    .btn-primary:hover { background: #333; }
    .btn-ghost { background: transparent; color: var(--text-muted); }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }
    .btn-icon { width: 40px; height: 40px; padding: 0; border-radius: 50%; display: grid; place-items: center; font-size: 1rem; }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-sm { padding: 7px 16px; font-size: 0.68rem; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-outline { background: transparent; border: 1px solid var(--noir); color: var(--noir); }
    .btn-outline:hover { background: var(--noir); color: #fff; }

    /* ── Filter Bar ── */
    .filter-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border-light);
      padding: 0 48px;
      display: flex; align-items: center; gap: 6px;
      height: 56px; overflow-x: auto; scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-label {
      font-size: 0.62rem;
      font-weight: 500;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      white-space: nowrap;
      margin-right: 8px;
    }
    .filter-chip {
      padding: 6px 16px;
      border-radius: 0;
      border: 1px solid transparent;
      border-bottom: 2px solid transparent;
      background: transparent;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      white-space: nowrap;
      transition: all var(--transition);
      text-transform: uppercase;
    }
    .filter-chip:hover { color: var(--noir); border-bottom-color: var(--text-light); }
    .filter-chip.active { color: var(--noir); border-bottom-color: var(--noir); font-weight: 500; }
    .filter-sep { width: 1px; height: 20px; background: var(--border-light); flex-shrink: 0; margin: 0 12px; }

    /* ── Main ── */
    main { flex: 1; padding: 48px; max-width: 1600px; margin: 0 auto; width: 100%; }
    .stats { display: flex; align-items: center; gap: 24px; margin-bottom: 40px; }
    .stat-item { font-size: 0.72rem; color: var(--text-light); letter-spacing: 0.1em; text-transform: uppercase; }
    .stat-item strong { color: var(--text); font-weight: 600; font-size: 1.1rem; margin-right: 4px; font-family: var(--font-serif); }

    /* ── Loading skeleton ── */
    .skeleton { background: linear-gradient(90deg, var(--surface2) 25%, var(--border-light) 50%, var(--surface2) 75%); background-size: 200% 100%; animation: shimmer 2s infinite; border-radius: var(--radius); }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skeleton-card { height: 380px; }

    /* ── Empty State ── */
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 120px 20px; text-align: center; gap: 20px; }
    .empty-icon { font-size: 3rem; opacity: 0.3; }
    .empty-state h2 { font-family: var(--font-serif); font-weight: 300; font-size: 1.8rem; letter-spacing: 0.05em; }
    .empty-state p { color: var(--text-muted); font-size: 0.85rem; max-width: 320px; line-height: 1.7; }

    /* ── Grid ── */
    .clothing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 24px;
    }

    /* ── Card ── */
    .clothing-card {
      background: var(--surface);
      border: none;
      overflow: hidden;
      cursor: pointer;
      transition: all var(--transition);
      position: relative;
    }
    .clothing-card:hover { transform: translateY(-4px); }
    .clothing-card:hover .card-image { transform: scale(1.03); }
    .clothing-card:hover .card-overlay { opacity: 1; }
    .card-image-wrap { overflow: hidden; aspect-ratio: 3/4; background: var(--surface2); position: relative; }
    .card-image { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    .card-image-placeholder { width: 100%; height: 100%; background: var(--surface2); display: grid; place-items: center; font-size: 1.5rem; color: var(--border); }
    .card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 50%);
      opacity: 0; transition: opacity var(--transition);
      display: flex; align-items: flex-end; padding: 20px;
    }
    .card-overlay-text { color: #fff; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500; }
    .card-body { padding: 16px 4px; }
    .card-name {
      font-family: var(--font-serif);
      font-weight: 400;
      font-size: 1.05rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 8px;
      letter-spacing: 0.01em;
    }
    .card-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      display: inline-flex; align-items: center;
      padding: 3px 10px;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      border: 1px solid var(--border);
      background: transparent;
    }
    .tag.season { border-color: var(--accent); color: var(--accent-dark); }
    .tag.mood { border-color: var(--text-light); color: var(--text-muted); }
    .tag.color { background: var(--surface2); border-color: var(--border); }
    .card-analyzing { display: flex; align-items: center; gap: 8px; padding: 10px 4px; font-size: 0.68rem; color: var(--text-muted); letter-spacing: 0.05em; text-transform: uppercase; }
    .spinner { width: 14px; height: 14px; border: 1.5px solid var(--border); border-top-color: var(--noir); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Upload Zone ── */
    .upload-zone {
      border: 1px solid var(--border);
      aspect-ratio: 3/4;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all var(--transition);
      background: var(--cream);
      gap: 12px;
      position: relative;
    }
    .upload-zone::before {
      content: '';
      position: absolute; inset: 8px;
      border: 1px dashed var(--border);
      pointer-events: none;
      transition: border-color var(--transition);
    }
    .upload-zone:hover, .upload-zone.dragover { border-color: var(--accent); }
    .upload-zone:hover::before, .upload-zone.dragover::before { border-color: var(--accent); }
    .upload-zone-icon { font-size: 1.5rem; opacity: 0.4; }
    .upload-zone p { color: var(--text-light); font-size: 0.68rem; text-align: center; padding: 0 20px; letter-spacing: 0.1em; text-transform: uppercase; }
    .upload-zone strong { color: var(--accent-dark); }

    /* ── Progress bar for upload ── */
    .upload-progress { height: 2px; background: var(--border-light); overflow: hidden; margin-top: 4px; }
    .upload-progress-bar { height: 100%; background: var(--accent); transition: width 0.3s; }

    /* ── Modal ── */
    .modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); display: grid; place-items: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-lg);
      width: 100%; max-width: 860px; max-height: 90vh;
      overflow: hidden; display: flex; flex-direction: column;
      transform: translateY(20px); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 36px 20px; border-bottom: 1px solid var(--border-light); flex-shrink: 0;
    }
    .modal-header h2 {
      font-family: var(--font-serif);
      font-weight: 400;
      font-size: 1.4rem;
      letter-spacing: 0.02em;
    }
    .modal-body { flex: 1; overflow-y: auto; padding: 36px; }
    .modal-footer {
      padding: 20px 36px;
      border-top: 1px solid var(--border-light);
      display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
    }

    /* ── Detail Layout ── */
    .detail-layout { display: grid; grid-template-columns: 280px 1fr; gap: 40px; }
    @media (max-width: 600px) { .detail-layout { grid-template-columns: 1fr; } }
    .detail-image-wrap {
      overflow: hidden;
      aspect-ratio: 3/4;
      background: var(--surface2);
      position: relative;
    }
    .detail-image-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .detail-image-loading { position: absolute; inset: 0; display: grid; place-items: center; background: var(--surface2); }
    .detail-fields { display: flex; flex-direction: column; gap: 20px; }
    .field-group { display: flex; flex-direction: column; gap: 8px; }
    .field-label {
      font-size: 0.62rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-light);
    }

    /* ── Inputs ── */
    .input {
      width: 100%; padding: 10px 0;
      border: none; border-bottom: 1px solid var(--border);
      font-size: 0.9rem; color: var(--text); background: transparent;
      transition: border-color var(--transition);
    }
    .input:focus { border-color: var(--noir); }
    .input-name {
      font-family: var(--font-serif);
      font-size: 1.3rem;
      font-weight: 400;
      padding: 8px 0;
      border: none; border-bottom: 1px solid var(--border);
      background: transparent;
      letter-spacing: 0.01em;
    }
    .input-name:focus { border-color: var(--noir); }
    select.input { padding: 10px 0; appearance: none; cursor: pointer; }

    /* ── Tag Editor ── */
    .tag-editor {
      display: flex; flex-wrap: wrap; gap: 6px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      min-height: 42px; cursor: text;
      transition: border-color var(--transition);
    }
    .tag-editor:focus-within { border-color: var(--noir); }
    .tag-editable {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--surface2);
      color: var(--text);
    }
    .tag-editable .remove { cursor: pointer; opacity: 0.4; font-size: 0.9rem; margin-left: 2px; }
    .tag-editable .remove:hover { opacity: 1; }
    .tag-input { border: none; background: transparent; font-size: 0.8rem; min-width: 80px; flex: 1; color: var(--text); }
    .tag-input::placeholder { color: var(--text-light); }

    /* ── Settings ── */
    .settings-form { display: flex; flex-direction: column; gap: 24px; }
    .setting-item { display: flex; flex-direction: column; gap: 10px; }
    .setting-label { font-family: var(--font-serif); font-weight: 400; font-size: 1rem; }
    .setting-desc { font-size: 0.78rem; color: var(--text-muted); line-height: 1.6; }
    .api-key-wrap { position: relative; }
    .api-key-wrap .input { font-family: monospace; font-size: 0.8rem; padding-right: 40px; border: 1px solid var(--border); padding: 12px 40px 12px 12px; }
    .api-key-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 0.9rem; padding: 4px; }

    /* ── Analyzing Banner ── */
    .analyzing-banner {
      background: var(--cream);
      border: 1px solid var(--border);
      padding: 16px 20px;
      display: flex; align-items: center; gap: 14px;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 28px;
    }
    .analyzing-banner .spinner { width: 16px; height: 16px; }

    /* ── Toast ── */
    .toast-container { position: fixed; bottom: 32px; right: 32px; z-index: 999; display: flex; flex-direction: column; gap: 10px; }
    .toast {
      padding: 14px 24px;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      box-shadow: var(--shadow-lg);
      animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      max-width: 360px;
    }
    .toast.success { background: var(--noir); color: #fff; }
    .toast.error { background: var(--danger); color: #fff; }
    .toast.info { background: var(--noir); color: #fff; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .no-results { text-align: center; padding: 80px 20px; color: var(--text-muted); font-family: var(--font-serif); font-size: 1.1rem; font-weight: 300; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ── Editorial Divider ── */
    .editorial-divider {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 40px;
    }
    .editorial-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .editorial-divider h1 {
      font-family: var(--font-serif);
      font-weight: 300;
      font-size: 1.4rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    @media (max-width: 768px) {
      header, main, .filter-bar { padding-left: 24px; padding-right: 24px; }
      main { padding-top: 32px; padding-bottom: 32px; }
      .clothing-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
      .logo-text { font-size: 1.2rem; letter-spacing: 0.2em; }
      .editorial-divider h1 { font-size: 1.1rem; }
    }
    @media (max-width: 500px) {
      header { padding: 0 16px; height: 60px; }
      .filter-bar { padding: 0 16px; }
      main { padding: 20px 16px; }
      .clothing-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .card-body { padding: 12px 2px; }
    }
  </style>
</head>
<body>

<div id="app" style="display:flex;flex-direction:column;min-height:100vh">

  <header>
    <div class="logo">
      <span class="logo-text">My Wardrobe</span>
    </div>
    <div class="header-actions">
      <div class="header-status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Verbinde</span>
      </div>
      <button class="btn btn-ghost btn-icon" id="settingsBtn" title="Einstellungen">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
      <button class="btn btn-primary" id="addBtn">+ Neu</button>
    </div>
  </header>

  <div class="filter-bar" id="filterBar">
    <span class="filter-label">Kollektion</span>
    <button class="filter-chip active" data-filter="all">Alles</button>
    <div class="filter-sep"></div>
    <span class="filter-label">Kategorie</span>
    <button class="filter-chip" data-filter="cat:Oberteil">Oberteil</button>
    <button class="filter-chip" data-filter="cat:Hose">Hose</button>
    <button class="filter-chip" data-filter="cat:Kleid">Kleid</button>
    <button class="filter-chip" data-filter="cat:Jacke">Jacke</button>
    <button class="filter-chip" data-filter="cat:Schuhe">Schuhe</button>
    <button class="filter-chip" data-filter="cat:Accessoire">Accessoire</button>
    <div class="filter-sep"></div>
    <span class="filter-label">Saison</span>
    <button class="filter-chip" data-filter="season:Frühling">Frühling</button>
    <button class="filter-chip" data-filter="season:Sommer">Sommer</button>
    <button class="filter-chip" data-filter="season:Herbst">Herbst</button>
    <button class="filter-chip" data-filter="season:Winter">Winter</button>
    <div class="filter-sep"></div>
    <span class="filter-label">Stil</span>
    <button class="filter-chip" data-filter="mood:Casual">Casual</button>
    <button class="filter-chip" data-filter="mood:Elegant">Elegant</button>
    <button class="filter-chip" data-filter="mood:Sportlich">Sportlich</button>
    <button class="filter-chip" data-filter="mood:Minimal">Minimal</button>
    <button class="filter-chip" data-filter="mood:Boho">Boho</button>
    <button class="filter-chip" data-filter="mood:Business">Business</button>
  </div>

  <main>
    <div class="stats" id="stats"></div>
    <div id="wardrobeGrid"></div>
  </main>

  <div class="toast-container" id="toastContainer"></div>
  <input type="file" id="fileInput" accept="image/*" multiple style="display:none" />
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
  <div class="modal" style="max-width:900px">
    <div class="modal-header">
      <h2 id="detailModalTitle">Details</h2>
      <button class="btn btn-ghost btn-icon" id="detailModalClose">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body" id="detailModalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="deleteBtn">Entfernen</button>
      <div style="display:flex;gap:12px">
        <button class="btn btn-ghost" id="detailCancelBtn">Abbrechen</button>
        <button class="btn btn-primary" id="saveBtn">Speichern</button>
      </div>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <h2>Einstellungen</h2>
      <button class="btn btn-ghost btn-icon" id="settingsModalClose">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="settings-form">
        <div class="setting-item">
          <label class="setting-label" for="apiKeyInput">Anthropic API-Key</label>
          <p class="setting-desc">Wird lokal gespeichert und nie an externe Server gesendet. Key erstellen unter <a href="https://console.anthropic.com" target="_blank" style="color:var(--accent-dark);text-decoration:underline">console.anthropic.com</a>.</p>
          <div class="api-key-wrap">
            <input class="input" type="password" id="apiKeyInput" placeholder="sk-ant-..." />
            <button class="api-key-toggle" id="apiKeyToggle">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer" style="justify-content:flex-end">
      <button class="btn btn-primary" id="saveSettingsBtn">Speichern</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  CONFIG & STATE
// ═══════════════════════════════════════════════════════════
const SETTINGS_KEY = 'wardrobe_settings_v2';

const state = {
  items: [],
  imageCache: {},
  settings: loadSettings(),
  activeFilter: 'all',
  editingItem: null,
  loading: true,
};

function loadSettings() {
  try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {}; }
  catch { return {}; }
}
function saveSettings() {
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(state.settings));
}

// ═══════════════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════════════
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function showToast(msg, type = 'info', duration = 3500) {
  const c = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), duration);
}

function openModal(id) {
  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setStatus(s) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  if (s === 'online')  { dot.className = 'status-dot online'; txt.textContent = 'Online'; }
  if (s === 'error')   { dot.className = 'status-dot error';  txt.textContent = 'Offline'; }
  if (s === 'loading') { dot.className = 'status-dot';         txt.textContent = 'Verbinde'; }
}

// ═══════════════════════════════════════════════════════════
//  IMAGE COMPRESSION
// ═══════════════════════════════════════════════════════════
function compressImage(file, maxWidthHeight = 1200, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let { width, height } = img;
      if (width > maxWidthHeight || height > maxWidthHeight) {
        const ratio = Math.min(maxWidthHeight / width, maxWidthHeight / height);
        width = Math.round(width * ratio);
        height = Math.round(height * ratio);
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      const dataUrl = canvas.toDataURL('image/jpeg', quality);
      const base64 = dataUrl.split(',')[1];
      resolve({ base64, dataUrl, mimeType: 'image/jpeg' });
    };
    img.onerror = reject;
    img.src = url;
  });
}

// ═══════════════════════════════════════════════════════════
//  API CALLS
// ═══════════════════════════════════════════════════════════
async function apiFetch(path, options = {}) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json', ...options.headers },
    ...options,
    body: options.body ? JSON.stringify(options.body) : undefined,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  return res.json();
}

async function loadAllItems() {
  setStatus('loading');
  try {
    state.items = await apiFetch('/api/items');
    setStatus('online');
  } catch (err) {
    setStatus('error');
    showToast(`Fehler beim Laden: ${err.message}`, 'error', 6000);
    state.items = [];
  }
  state.loading = false;
  renderGrid();
}

async function loadItemImage(id) {
  if (state.imageCache[id]) return state.imageCache[id];
  try {
    const item = await apiFetch(`/api/items/${id}`);
    if (item.imageData) {
      state.imageCache[id] = item.imageData;
      return item.imageData;
    }
  } catch {}
  return null;
}

async function createItem(doc) {
  return apiFetch('/api/items', { method: 'POST', body: doc });
}

async function updateItem(id, updates) {
  return apiFetch(`/api/items/${id}`, { method: 'PUT', body: updates });
}

async function deleteItem(id) {
  return apiFetch(`/api/items/${id}`, { method: 'DELETE' });
}

// ═══════════════════════════════════════════════════════════
//  CLAUDE API – KI-ANALYSE (via /api/analyze)
// ═══════════════════════════════════════════════════════════
async function analyzeClothing(base64Image, mimeType) {
  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ base64Image, mimeType }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      showToast(`KI-Fehler: ${err?.error || res.status}`, 'error', 5000);
      return null;
    }

    return await res.json();
  } catch (err) {
    showToast(`Analyse fehlgeschlagen: ${err.message}`, 'error', 5000);
    return null;
  }
}

// ═══════════════════════════════════════════════════════════
//  UPLOAD & ANALYSE
// ═══════════════════════════════════════════════════════════
async function handleFiles(files) {
  if (!state.settings.apiKey) {
    openModal('settingsModal');
    showToast('Bitte zuerst den API-Key hinterlegen.', 'info');
    return;
  }

  for (const file of Array.from(files)) {
    if (!file.type.startsWith('image/')) continue;

    showToast(`Komprimiere ${file.name}...`, 'info', 2000);
    let compressed;
    try {
      compressed = await compressImage(file);
    } catch {
      showToast(`Konnte ${file.name} nicht lesen.`, 'error');
      continue;
    }

    const placeholder = {
      id: `tmp_${uid()}`,
      name: file.name.replace(/\.[^.]+$/,'') || 'Neues Teil',
      analyzing: true,
      farben: [], jahreszeiten: [], styleMood: [],
      kategorie: '', sitz: '', laenge: '', material: '', textur: '', waerme: '', notizen: '',
      _imageData: compressed.dataUrl,
    };
    state.items.unshift(placeholder);
    renderGrid();

    const [created, analysis] = await Promise.all([
      createItem({
        name: placeholder.name,
        imageData: compressed.dataUrl,
        analyzing: true,
        farben: [], jahreszeiten: [], styleMood: [],
        kategorie: '', sitz: '', laenge: '', material: '', textur: '', waerme: '', notizen: '',
        addedAt: new Date().toISOString(),
      }),
      analyzeClothing(compressed.base64, compressed.mimeType),
    ]);

    if (!created) {
      state.items = state.items.filter(i => i.id !== placeholder.id);
      renderGrid();
      continue;
    }

    const finalData = analysis
      ? { ...analysis, analyzing: false }
      : { analyzing: false };

    await updateItem(created.id, finalData).catch(() => {});

    state.imageCache[created.id] = compressed.dataUrl;

    const finalItem = { ...created, ...finalData, id: created.id, _imageData: compressed.dataUrl };
    state.items = state.items.map(i => i.id === placeholder.id ? finalItem : i);

    if (analysis) showToast(`${analysis.name || finalItem.name} gespeichert`, 'success');
    else showToast(`${finalItem.name} gespeichert (ohne Analyse)`, 'info');

    renderGrid();
  }
}

// ═══════════════════════════════════════════════════════════
//  FILTER
// ═══════════════════════════════════════════════════════════
function getFilteredItems() {
  const f = state.activeFilter;
  if (f === 'all') return state.items;
  if (f.startsWith('cat:'))    return state.items.filter(i => i.kategorie === f.slice(4));
  if (f.startsWith('season:')) return state.items.filter(i => (i.jahreszeiten||[]).includes(f.slice(7)));
  if (f.startsWith('mood:'))   return state.items.filter(i => (i.styleMood||[]).includes(f.slice(5)));
  return state.items;
}

// ═══════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════
function renderGrid() {
  const grid = document.getElementById('wardrobeGrid');
  const stats = document.getElementById('stats');
  const filtered = getFilteredItems();

  const count = state.items.filter(i=>!i.analyzing).length;
  stats.innerHTML = `
    <div class="editorial-divider">
      <h1>Kollektion</h1>
    </div>
  `;

  if (state.loading) {
    grid.innerHTML = `<div class="clothing-grid">${Array(6).fill('<div class="skeleton skeleton-card"></div>').join('')}</div>`;
    return;
  }

  if (state.items.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">&#9670;</div>
        <h2>Dein Kleiderschrank wartet</h2>
        <p>Lade dein erstes Foto hoch. Die KI erkennt automatisch Farbe, Material, Stil und Saison.</p>
        <button class="btn btn-outline" onclick="document.getElementById('fileInput').click()">Erstes Foto hochladen</button>
      </div>`;
    return;
  }

  if (filtered.length === 0 && state.activeFilter !== 'all') {
    grid.innerHTML = `<div class="no-results">Keine Ergebnisse f&uuml;r diesen Filter.</div>`;
    return;
  }

  const frag = document.createDocumentFragment();
  const wrapper = document.createElement('div');
  wrapper.className = 'clothing-grid';

  // Upload-Karte
  const uploadEl = document.createElement('div');
  uploadEl.innerHTML = `
    <div class="upload-zone" id="uploadZoneGrid">
      <div class="upload-zone-icon">+</div>
      <p><strong>Hinzufügen</strong></p>
    </div>`;
  wrapper.appendChild(uploadEl);

  for (const item of filtered) {
    const card = document.createElement('div');
    card.className = 'clothing-card';
    card.dataset.id = item.id;

    const imgSrc = item._imageData || state.imageCache[item.id];
    const imgHtml = imgSrc
      ? `<div class="card-image-wrap"><img class="card-image" src="${imgSrc}" alt="${esc(item.name)}" loading="lazy" /><div class="card-overlay"><span class="card-overlay-text">Details ansehen</span></div></div>`
      : `<div class="card-image-wrap"><div class="card-image-placeholder" data-load-id="${item.id}"></div></div>`;

    const tags = [
      ...(item.farben?.length    ? [`<span class="tag color">${esc(item.farben[0])}</span>`] : []),
      ...(item.jahreszeiten?.length ? [`<span class="tag season">${esc(item.jahreszeiten[0])}</span>`] : []),
      ...(item.styleMood?.length  ? [`<span class="tag mood">${esc(item.styleMood[0])}</span>`] : []),
    ];

    card.innerHTML = `
      ${imgHtml}
      ${item.analyzing ? `<div class="card-analyzing"><div class="spinner"></div> Analyse läuft</div>` : ''}
      <div class="card-body">
        <div class="card-name">${esc(item.name || 'Ohne Titel')}</div>
        <div class="card-tags">${tags.slice(0,3).join('')}</div>
      </div>`;

    card.addEventListener('click', () => { if (!item.analyzing) openDetailModal(item.id); });
    wrapper.appendChild(card);
  }

  frag.appendChild(wrapper);
  grid.innerHTML = '';
  grid.appendChild(frag);

  // Lazy-load
  grid.querySelectorAll('[data-load-id]').forEach(async el => {
    const id = el.dataset.loadId;
    const img = await loadItemImage(id);
    if (img) {
      const placeholder = grid.querySelector(`[data-id="${id}"] .card-image-placeholder`);
      if (placeholder) placeholder.outerHTML = `<img class="card-image" src="${img}" alt="" loading="lazy" /><div class="card-overlay"><span class="card-overlay-text">Details ansehen</span></div>`;
    }
  });

  // Upload-Zone Events
  const uz = document.getElementById('uploadZoneGrid');
  if (uz) {
    uz.addEventListener('click', () => document.getElementById('fileInput').click());
    uz.addEventListener('dragover', e => { e.preventDefault(); uz.classList.add('dragover'); });
    uz.addEventListener('dragleave', () => uz.classList.remove('dragover'));
    uz.addEventListener('drop', e => { e.preventDefault(); uz.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
  }
}

// ═══════════════════════════════════════════════════════════
//  DETAIL MODAL
// ═══════════════════════════════════════════════════════════
async function openDetailModal(id) {
  const item = state.items.find(i => i.id === id);
  if (!item) return;
  state.editingItem = { ...item };

  document.getElementById('detailModalTitle').textContent = item.name || 'Details';
  renderDetailModal(item, null);
  openModal('detailModal');

  const imgSrc = item._imageData || state.imageCache[id] || await loadItemImage(id);
  if (imgSrc) renderDetailModal(item, imgSrc);
}

function renderDetailModal(item, imgSrc) {
  const body = document.getElementById('detailModalBody');
  const cats   = ['Oberteil','Hose','Kleid','Rock','Jacke','Mantel','Pullover','Schuhe','Accessoire','Sonstiges'];
  const sitze  = ['Slim/Eng','Regular/Normal','Oversized/Weit'];
  const waerme = ['Sehr leicht (25°C+)','Leicht (20-25°C)','Mittel (10-20°C)','Warm (0-10°C)','Sehr warm (-10-0°C)'];
  const seasons = ['Frühling','Sommer','Herbst','Winter'];
  const moods  = ['Casual','Elegant','Sportlich','Minimal','Boho','Business','Streetwear','Romantic','Rock','Vintage','Preppy','Festlich'];

  const imgHtml = imgSrc
    ? `<img src="${imgSrc}" alt="${esc(item.name)}" style="width:100%;height:100%;object-fit:cover" />`
    : `<div class="detail-image-loading"><div class="spinner" style="width:24px;height:24px"></div></div>`;

  body.innerHTML = `
    ${item.analyzing ? `<div class="analyzing-banner"><div class="spinner"></div>KI-Analyse läuft</div>` : ''}
    <div class="detail-layout">
      <div>
        <div class="detail-image-wrap">${imgHtml}</div>
      </div>
      <div class="detail-fields">
        <div class="field-group">
          <label class="field-label">Name</label>
          <input class="input input-name" id="f_name" value="${esc(item.name||'')}" placeholder="z.B. Weißes Leinenhemd" />
        </div>
        <div class="field-group">
          <label class="field-label">Kategorie</label>
          <select class="input" id="f_kat">
            <option value="">– wählen –</option>
            ${cats.map(c=>`<option value="${c}" ${item.kategorie===c?'selected':''}>${c}</option>`).join('')}
          </select>
        </div>
        <div class="field-group">
          <label class="field-label">Farben</label>
          ${buildTagEditor('f_farben', item.farben||[], 'Farbe + Enter')}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="field-group">
            <label class="field-label">Sitz</label>
            <select class="input" id="f_sitz">
              <option value="">–</option>
              ${sitze.map(s=>`<option value="${s}" ${item.sitz===s?'selected':''}>${s}</option>`).join('')}
            </select>
          </div>
          <div class="field-group">
            <label class="field-label">Länge</label>
            <select class="input" id="f_laenge">
              <option value="">–</option>
              ${['Kurz','Normal','Lang'].map(l=>`<option value="${l}" ${item.laenge===l?'selected':''}>${l}</option>`).join('')}
            </select>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="field-group">
            <label class="field-label">Material</label>
            <input class="input" id="f_material" value="${esc(item.material||'')}" placeholder="z.B. Baumwolle" />
          </div>
          <div class="field-group">
            <label class="field-label">Textur</label>
            <input class="input" id="f_textur" value="${esc(item.textur||'')}" placeholder="z.B. Denim" />
          </div>
        </div>
        <div class="field-group">
          <label class="field-label">Wärme</label>
          <select class="input" id="f_waerme">
            <option value="">– wählen –</option>
            ${waerme.map(w=>`<option value="${w}" ${item.waerme===w?'selected':''}>${w}</option>`).join('')}
          </select>
        </div>
        <div class="field-group">
          <label class="field-label">Jahreszeiten</label>
          <div style="display:flex;gap:12px;flex-wrap:wrap">
            ${seasons.map(s=>`<label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:0.8rem;letter-spacing:0.02em"><input type="checkbox" data-group="jahreszeiten" value="${s}" ${(item.jahreszeiten||[]).includes(s)?'checked':''} style="accent-color:var(--noir)" />${s}</label>`).join('')}
          </div>
        </div>
        <div class="field-group">
          <label class="field-label">Stil</label>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            ${moods.map(m=>`<label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:0.8rem;letter-spacing:0.02em"><input type="checkbox" data-group="styleMood" value="${m}" ${(item.styleMood||[]).includes(m)?'checked':''} style="accent-color:var(--noir)" />${m}</label>`).join('')}
          </div>
        </div>
        <div class="field-group">
          <label class="field-label">Notizen</label>
          <textarea class="input" id="f_notizen" rows="3" placeholder="Kombinationstipps..." style="border:1px solid var(--border);padding:12px;resize:vertical">${esc(item.notizen||'')}</textarea>
        </div>
      </div>
    </div>`;

  initTagEditor('f_farben');
}

// ── Tag Editor ──
function buildTagEditor(id, values, placeholder) {
  const tags = values.map(v=>`<span class="tag-editable">${esc(v)}<span class="remove">&times;</span></span>`).join('');
  return `<div class="tag-editor" id="${id}">${tags}<input class="tag-input" placeholder="${placeholder}" /></div>`;
}
function initTagEditor(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const input = el.querySelector('.tag-input');
  el.addEventListener('click', e => {
    if (e.target.classList.contains('remove')) e.target.closest('.tag-editable').remove();
    else input.focus();
  });
  input.addEventListener('keydown', e => {
    if ((e.key==='Enter'||e.key===',') && input.value.trim()) {
      e.preventDefault();
      const span = document.createElement('span');
      span.className = 'tag-editable';
      span.innerHTML = `${esc(input.value.trim())}<span class="remove">&times;</span>`;
      el.insertBefore(span, input);
      input.value = '';
    }
    if (e.key==='Backspace' && !input.value) {
      const tags = el.querySelectorAll('.tag-editable');
      if (tags.length) tags[tags.length-1].remove();
    }
  });
}
function getTagEditorValues(id) {
  return Array.from(document.querySelectorAll(`#${id} .tag-editable`)).map(t=>t.textContent.replace('×','').trim()).filter(Boolean);
}
function getCheckboxValues(group) {
  return Array.from(document.querySelectorAll(`[data-group="${group}"]:checked`)).map(c=>c.value);
}
function collectForm() {
  return {
    name:         document.getElementById('f_name')?.value.trim()||'',
    kategorie:    document.getElementById('f_kat')?.value||'',
    farben:       getTagEditorValues('f_farben'),
    sitz:         document.getElementById('f_sitz')?.value||'',
    laenge:       document.getElementById('f_laenge')?.value||'',
    material:     document.getElementById('f_material')?.value.trim()||'',
    textur:       document.getElementById('f_textur')?.value.trim()||'',
    waerme:       document.getElementById('f_waerme')?.value||'',
    jahreszeiten: getCheckboxValues('jahreszeiten'),
    styleMood:    getCheckboxValues('styleMood'),
    notizen:      document.getElementById('f_notizen')?.value.trim()||'',
  };
}

// ═══════════════════════════════════════════════════════════
//  EVENT LISTENERS
// ═══════════════════════════════════════════════════════════
document.getElementById('addBtn').addEventListener('click', () => document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', e => { handleFiles(e.target.files); e.target.value=''; });

// Drag & drop auf gesamte Seite
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => { e.preventDefault(); if(e.dataTransfer.files.length) handleFiles(e.dataTransfer.files); });

// Filter
document.getElementById('filterBar').addEventListener('click', e => {
  const chip = e.target.closest('.filter-chip');
  if (!chip) return;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  chip.classList.add('active');
  state.activeFilter = chip.dataset.filter;
  renderGrid();
});

// Detail Modal
document.getElementById('detailModalClose').addEventListener('click', () => closeModal('detailModal'));
document.getElementById('detailCancelBtn').addEventListener('click', () => closeModal('detailModal'));

document.getElementById('saveBtn').addEventListener('click', async () => {
  if (!state.editingItem) return;
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Speichern...';
  try {
    const values = collectForm();
    await updateItem(state.editingItem.id, values);
    state.items = state.items.map(i => i.id === state.editingItem.id ? {...i, ...values} : i);
    saveItems_noop();
    renderGrid();
    showToast('Gespeichert', 'success');
    closeModal('detailModal');
  } catch(err) {
    showToast(`Fehler: ${err.message}`, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Speichern';
  }
});

document.getElementById('deleteBtn').addEventListener('click', async () => {
  if (!state.editingItem) return;
  if (!confirm(`"${state.editingItem.name}" wirklich löschen?`)) return;
  try {
    await deleteItem(state.editingItem.id);
    delete state.imageCache[state.editingItem.id];
    state.items = state.items.filter(i => i.id !== state.editingItem.id);
    renderGrid();
    showToast('Entfernt', 'info');
    closeModal('detailModal');
  } catch(err) {
    showToast(`Fehler: ${err.message}`, 'error');
  }
});

// Settings
document.getElementById('settingsBtn').addEventListener('click', () => {
  document.getElementById('apiKeyInput').value = state.settings.apiKey || '';
  openModal('settingsModal');
});
document.getElementById('settingsModalClose').addEventListener('click', () => closeModal('settingsModal'));
document.getElementById('saveSettingsBtn').addEventListener('click', () => {
  state.settings.apiKey = document.getElementById('apiKeyInput').value.trim();
  saveSettings();
  showToast('Einstellungen gespeichert', 'success');
  closeModal('settingsModal');
});
document.getElementById('apiKeyToggle').addEventListener('click', () => {
  const inp = document.getElementById('apiKeyInput');
  inp.type = inp.type === 'password' ? 'text' : 'password';
});

// Overlay-Klick schließt Modal
document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', e => { if(e.target===o) closeModal(o.id); }));
document.addEventListener('keydown', e => { if(e.key==='Escape') document.querySelectorAll('.modal-overlay.open').forEach(m=>closeModal(m.id)); });

function saveItems_noop() {}

// ═══════════════════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════════════════
loadAllItems();
</script>
</body>
